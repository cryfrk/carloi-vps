services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-carloi}
      POSTGRES_USER: ${POSTGRES_USER:-carloi_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strong_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-carloi_user} -d ${POSTGRES_DB:-carloi}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.vps
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: ${PORT:-8080}
      API_PORT: ${API_PORT:-8080}
      DATABASE_URL: postgresql://${POSTGRES_USER:-carloi_user}:${POSTGRES_PASSWORD:-strong_password}@postgres:5432/${POSTGRES_DB:-carloi}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      UPLOAD_DIR: /app/uploads
      VCARX_DISABLE_EMAIL: ${VCARX_DISABLE_EMAIL:-true}
      SMTP_DISABLED: ${SMTP_DISABLED:-true}
      VCARX_REQUIRE_HTTPS: ${VCARX_REQUIRE_HTTPS:-true}
      VCARX_TRUST_PROXY: ${VCARX_TRUST_PROXY:-true}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8080:8080"
    expose:
      - "8080"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 10s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads_data:/var/www/uploads:ro

volumes:
  postgres_data:
  uploads_data:
